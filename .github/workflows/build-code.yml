name: build-code

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: runner-medium
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm v10
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install Node.js v24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build code
        run: pnpm build
